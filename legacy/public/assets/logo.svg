<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="100%" height="100%">
  <!-- Rounded square background for logo "P+" -->
  <rect width="40" height="40" rx="8" fill="#1b281b" stroke="#354b34" stroke-width="2"/>
  <!-- Tactical crosshairs / grid ticks in the corners -->
  <line x1="4" y1="8" x2="8" y2="8" stroke="#10b981" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="4" x2="8" y2="8" stroke="#10b981" stroke-width="1" stroke-linecap="round"/>
  <!-- P text -->
  <text x="11" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" fill="#f3f4f6" letter-spacing="-1">P</text>
  <!-- Plus sign -->
  <path d="M26 15 v6 M23 18 h6" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
</svg>
