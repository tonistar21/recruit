services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruit}
      POSTGRES_USER: ${POSTGRES_USER:-recruit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruit_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruit} -d ${POSTGRES_DB:-recruit}"]
      interval: 5s
      timeout: 3s
      retries: 15
  backend:
    build: ./backend
    group_add:
      - "${RECRUIT_STORAGE_GID:-1000}"
    environment:
      RECRUIT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-recruit}:${POSTGRES_PASSWORD:-recruit_dev_password}@postgres:5432/${POSTGRES_DB:-recruit}
      RECRUIT_SECRET_KEY: ${RECRUIT_SECRET_KEY:-development-only-change-me-please-32-characters}
      RECRUIT_STORAGE_PATH: /app/storage
      RECRUIT_ALLOWED_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 3s
      retries: 10
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres_data:
